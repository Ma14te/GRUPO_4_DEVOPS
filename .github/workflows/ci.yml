name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew build --no-daemon

      - name: Prepare deploy artifact
        run: |
          mkdir -p deploy
          JAR_FILE=$(find build/libs -maxdepth 1 -type f -name '*.jar' ! -name '*-plain.jar' | head -n 1)
          cp "$JAR_FILE" deploy/app.jar

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: deploy/app.jar

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs:
      - build
      - test
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      EC2_HOST: 18.218.230.144
      EC2_USER: ec2-user
      EC2_APP_DIR: /home/ec2-user/user-service
      DB_HOST: grupo-4-rds.ct8iogk44c9s.us-east-2.rds.amazonaws.com
      DB_NAME: userdb
      DB_USER: postgres

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: user-service-jar
          path: build/libs

      - name: Configure SSH
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          test -n "$EC2_HOST" || (echo "Missing EC2_HOST deploy config" && exit 1)
          test -n "$EC2_SSH_KEY" || (echo "Missing EC2_SSH_KEY secret" && exit 1)
          mkdir -p ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" | tr -d '\r' > ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -y -f ~/.ssh/ec2_key > /dev/null
          ssh-keyscan -T 60 -H "$EC2_HOST" >> ~/.ssh/known_hosts || true

      - name: Copy jar to EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o User="$EC2_USER" -i ~/.ssh/ec2_key "$EC2_HOST" "mkdir -p '$EC2_APP_DIR'"
          scp -o StrictHostKeyChecking=no -o User="$EC2_USER" -i ~/.ssh/ec2_key build/libs/app.jar "$EC2_HOST:$EC2_APP_DIR/app.jar"

      - name: Ensure Java on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -o User="$EC2_USER" -i ~/.ssh/ec2_key "$EC2_HOST" "if ! command -v java >/dev/null 2>&1; then sudo yum install -y java-25-amazon-corretto-headless; fi; java -version"

      - name: Restart application
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
        run: |
          DB_URL="jdbc:postgresql://$DB_HOST:5432/$DB_NAME"
          DB_URL_ESCAPED=$(printf '%q' "$DB_URL")
          DB_USER_ESCAPED=$(printf '%q' "$DB_USER")
          DB_PASS_ESCAPED=$(printf '%q' "${DB_PASS:-}")
          ssh -o StrictHostKeyChecking=no -o User="$EC2_USER" -i ~/.ssh/ec2_key "$EC2_HOST" "cd '$EC2_APP_DIR' && pkill -f '[j]ava -jar app.jar' || true"
          ssh -o StrictHostKeyChecking=no -o User="$EC2_USER" -i ~/.ssh/ec2_key "$EC2_HOST" "cd '$EC2_APP_DIR' && nohup env SERVER_PORT='8080' SPRING_DATASOURCE_URL=$DB_URL_ESCAPED SPRING_DATASOURCE_USERNAME=$DB_USER_ESCAPED SPRING_DATASOURCE_PASSWORD=$DB_PASS_ESCAPED java -jar app.jar > app.log 2>&1 < /dev/null &"
